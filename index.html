<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="E-Prayog — An interactive virtual science laboratory for Karnataka PUC students featuring immersive 2D simulations and AI-powered tutoring." />
    <meta name="theme-color" content="#020617" />
    <title>E-Prayog | ಇ-ಪ್ರಯೋಗ — Virtual Science Lab for Karnataka PUC</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #f8fafc;
        --text-color: #0f172a;
        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(148, 163, 184, 0.15);
        --nav-bg: rgba(255, 255, 255, 0.85);
        --gradient-1: rgba(14, 165, 233, 0.08);
        --gradient-2: rgba(16, 185, 129, 0.08);
        --gradient-3: rgba(245, 158, 11, 0.08);
        --gradient-4: rgba(99, 102, 241, 0.08);
        --accent-glow: rgba(16, 185, 129, 0.3);
      }
      .dark {
        --bg-color: #020617;
        --text-color: #f1f5f9;
        --glass-bg: rgba(15, 23, 42, 0.4);
        --glass-border: rgba(51, 65, 85, 0.5);
        --nav-bg: rgba(2, 6, 23, 0.8);
        --gradient-1: rgba(14, 165, 233, 0.15);
        --gradient-2: rgba(16, 185, 129, 0.15);
        --gradient-3: rgba(245, 158, 11, 0.12);
        --gradient-4: rgba(99, 102, 241, 0.15);
        --accent-glow: rgba(16, 185, 129, 0.5);
      }

      * { box-sizing: border-box; }
      ::selection { background-color: var(--accent-glow); color: inherit; }

      body {
        background-color: var(--bg-color);
        background-image:
          radial-gradient(at 0% 0%, var(--gradient-1) 0px, transparent 50%),
          radial-gradient(at 100% 0%, var(--gradient-2) 0px, transparent 50%),
          radial-gradient(at 100% 100%, var(--gradient-3) 0px, transparent 50%),
          radial-gradient(at 0% 100%, var(--gradient-4) 0px, transparent 50%);
        background-attachment: fixed;
        color: var(--text-color);
        transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s ease;
        position: relative;
      }

      body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        opacity: 0.035;
        z-index: 1000;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      .glass-panel {
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      }
      .dark .glass-panel {
        box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.2), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      }
      .glass-nav {
        background: var(--nav-bg);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-bottom: 1px solid var(--glass-border);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
      }
      .text-glow { text-shadow: 0 0 20px var(--accent-glow); }
      .hover-lift { transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
      .hover-lift:hover { transform: translateY(-8px); }
      .preserve-3d { transform-style: preserve-3d; }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.05); }
      .dark ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
      ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.2); border-radius: 4px; }
      .dark ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); }
      ::-webkit-scrollbar-thumb:hover { background: rgba(0, 0, 0, 0.3); }
      .dark ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.25); }
    </style>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
